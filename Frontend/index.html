<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Conecta - Controle</title>
    <link rel="stylesheet" href="style.min.css" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>Conecta</h2>

        <button onclick="trocarAba('treinamento')">📚 Treinamento</button>
        <button onclick="trocarAba('manutencao')">🛠️ Manutenção</button>
        <button onclick="window.open('tv/tv.html')">📺 Painel TV</button>
      </aside>

      <main class="content">
        <h1 id="titulo">Treinamento</h1>

        <!-- TREINAMENTO -->
        <section id="treinamento" class="aba ativa">
          <div class="painel-atendimento">
            <h2>Em treinamento</h2>
            <p id="atendendoAgora">-</p>
          </div>

          <div class="cards">
            <div class="card">
              <h3>Próximo</h3>
              <p id="proximoTreinamento">-</p>
            </div>
            <div class="card">
              <h3>Total</h3>
              <p id="totalTreinamento">0</p>
            </div>
          </div>

          <div class="acao">
            <input id="clienteTreinamento" placeholder="Cliente" />
            <select id="tipoTreinamento">
              <option value="1° treinamento">1° treinamento</option>
              <option value="2° treinamento">2° treinamento</option>
              <option value="3° treinamento">3° treinamento</option>
              <option value="Treinamento/Dúvidas">Treinamento/Dúvidas</option>
            </select>
            <button onclick="chamarTreinamento()">Iniciar</button>
            <button class="warning" onclick="pularTreinamento()">Pular</button>
            <button class="danger" onclick="atualizar()">Atualizar</button>
          </div>

          <div class="grid">
            <div class="box">
              <h3>Fila</h3>
              <ul id="filaTreinamento"></ul>
            </div>

            <div class="box">
              <h3>Histórico</h3>
              <div class="scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Pessoa</th>
                      <th>Cliente</th>
                      <th>Tipo</th>
                      <th>Motivo</th>
                      <th>Data</th>
                    </tr>
                  </thead>
                  <tbody id="historicoTreinamento"></tbody>
                </table>
              </div>

              <h3>Ranking</h3>
              <div class="scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Pessoa</th>
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody id="ranking"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <!-- MANUTENÇÃO -->
        <section id="manutencao" class="aba">
          <h2>Manutenção</h2>

          <div class="acao">
            <input id="equipamento" placeholder="N° Equipamento" />
            <button onclick="chamarManutencao()">Finalizar</button>
          </div>

          <div class="grid">
            <div class="box">
              <h3>Fila</h3>
              <ul id="filaManutencao"></ul>
            </div>

            <div class="box">
              <h3>Histórico</h3>
              <div class="scroll">
                <table>
                  <thead>
                    <tr>
                      <th>Pessoa</th>
                      <th>Equipamento</th>
                      <th>Data</th>
                    </tr>
                  </thead>
                  <tbody id="historicoManutencao"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div id="modalFinalizar" class="modal hidden">
      <div class="modal-content">
        <h2>Finalizar Atendimento</h2>

        <p id="modalTexto">-</p>

        <button onclick="confirmarFinalizacao()">Finalizar</button>
        <button onclick="fecharModal()">Cancelar</button>
      </div>
    </div>

    <div id="modalPular" class="modal hidden">
      <div class="modal-content modal-pular">
        <h2>Motivo da Pulada</h2>

        <textarea
          id="inputMotivoPular"
          placeholder="Digite o motivo pela qual está pulando a vez..."
          maxlength="150"
        ></textarea>

        <div class="modal-actions">
          <button class="btn-primary" onclick="confirmarPular()">Pular</button>
          <button class="btn-secondary" onclick="fecharModalPular()">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <script src="script.min.js"></script>
  </body>
</html>
